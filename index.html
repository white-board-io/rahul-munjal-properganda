<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rahul Munjal Email Signature</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <table class="signature" role="presentation" cellpadding="0" cellspacing="0">
    <tr>
      <td class="signature-left-cell">
        <div class="signature-left">
          <div class="signature-logo" aria-hidden="true">
            <img src="assets/logo-base.png" alt="Hero Future Energies logo">
          </div>

          <p class="signature-name">RAHUL MUNJAL</p>
          <p class="signature-title">Chairman and Managing Director</p>

          <a class="signature-link signature-link-x" href="https://x.com/rahulmunjal14" target="_blank" rel="noopener noreferrer">
            <span class="signature-icon" aria-hidden="true">
              <svg viewBox="0 0 10 10" focusable="false" aria-hidden="true">
                <circle cx="5" cy="5" r="5" fill="#8fc05b"></circle>
                <path d="M3 2.5 7 7.5M7 2.5 3 7.5" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="1.1"></path>
              </svg>
            </span>
            <span>@rahulmunjal14</span>
          </a>

          <a class="signature-link signature-link-linkedin" href="https://www.linkedin.com/in/rahul-munjal-2b5b77114/" target="_blank" rel="noopener noreferrer">
            <span class="signature-icon" aria-hidden="true">
              <svg viewBox="0 0 10 10" focusable="false" aria-hidden="true">
                <circle cx="5" cy="5" r="5" fill="#8fc05b"></circle>
                <text x="5" y="6.65" fill="#ffffff" font-family="Arial, sans-serif" font-size="4.15" font-weight="700" text-anchor="middle">in</text>
              </svg>
            </span>
            <span>linkedin.com/in/rahul-munjal</span>
          </a>

          <a class="signature-link signature-link-website" href="https://www.herofutureenergies.com" target="_blank" rel="noopener noreferrer">
            <span class="signature-icon" aria-hidden="true">
              <svg viewBox="0 0 10 10" focusable="false" aria-hidden="true">
                <circle cx="5" cy="5" r="5" fill="#8fc05b"></circle>
                <circle cx="5" cy="5" r="2.3" fill="none" stroke="#ffffff" stroke-width="0.8"></circle>
                <path d="M2.8 5h4.4M5 2.8c.9 1 1.4 2.2 1.4 2.2S5.9 6.2 5 7.2M5 2.8C4.1 3.8 3.6 5 3.6 5s.5 1.2 1.4 2.2" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="0.65"></path>
              </svg>
            </span>
            <span>www.herofutureenergies.com</span>
          </a>

          <p class="signature-footer signature-footer-1">
            Co-Chair, CII <strong>National Committee on Renewable Energy</strong> 2025-26
          </p>
          <p class="signature-footer signature-footer-2">
            Trustee of <strong>Raman Kant Munjal Foundation</strong>
          </p>
        </div>
      </td>

      <td class="signature-right-cell">
        <div class="signature-right">
          <img
            class="signature-panel-image"
            src="assets/right-banner.png"
            alt="Hero Future Energies signature banner artwork"
          >
          <p class="signature-quote">“You miss a 100% of the shots you don’t take”</p>
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
